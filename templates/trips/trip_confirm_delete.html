{% extends 'base.html' %}
{% block title %}Удалить поездку — TripMate{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body text-center">
                <h4 class="mb-3">Удалить поездку «{{ trip.title }}»?</h4>
                <p class="text-muted">Это действие необратимо. Все заявки на поездку также будут удалены.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
                    <a href="{% url 'trips:trip_detail' pk=trip.pk %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
