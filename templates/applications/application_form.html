{% extends 'base.html' %}
{% block title %}Заявка на поездку — TripMate{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="mb-3">Заявка на поездку «{{ trip.title }}»</h1>
        <p class="text-muted">Организатор: {{ trip.organizer.username }}. Свободно мест: {{ trip.free_places }}.</p>
        <form method="post">
            {% csrf_token %}
            <label class="form-label">{{ form.message.label }}</label>
            {{ form.message }}
            <button type="submit" class="btn btn-primary mt-3">Отправить заявку</button>
            <a href="{% url 'trips:trip_detail' pk=trip.pk %}" class="btn btn-outline-secondary mt-3">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
